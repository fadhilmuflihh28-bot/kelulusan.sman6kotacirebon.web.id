<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelulusan SMAN 6 Kota Cirebon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f4f5f7;
            color: #111827;
            -webkit-font-smoothing: antialiased;
        }

        /* Login View */
        #login-view {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .logo {
            width: 90px;
            height: auto;
            margin-bottom: 24px;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #4b5563;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            color: #111827;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input::placeholder {
            color: #9ca3af;
        }

        .input-group input:focus {
            border-color: #3b82f6;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #111827;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 12px;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #1f2937;
        }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            background-color: #ffffff;
            color: #4b5563;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-secondary:hover {
            background-color: #f9fafb;
        }

        /* Result View */
        #result-view {
            display: none;
            min-height: 100vh;
            background-color: #ffffff;
            padding: 24px 20px;
        }

        .result-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .status-card {
            border: 1px solid #e5e7eb;
            padding: 40px 20px;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .status-title {
            color: #dc2626;
            /* Red for not passing */
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .status-text {
            color: #111827;
            font-size: 14px;
            line-height: 1.6;
        }

        .status-text a {
            color: #3b82f6;
            text-decoration: none;
        }

        .status-text a:hover {
            text-decoration: underline;
        }

        hr.divider {
            border: 0;
            border-top: 1px solid #e5e7eb;
            margin: 40px 0;
        }

        .data-section-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #111827;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .data-table th,
        .data-table td {
            border: 1px solid #e5e7eb;
            padding: 14px 16px;
            text-align: left;
        }

        .data-table th {
            width: 35%;
            font-weight: 700;
            color: #111827;
            background-color: #ffffff;
            vertical-align: middle;
        }

        .data-table td {
            color: #374151;
            background-color: #ffffff;
            vertical-align: middle;
        }

        .data-table td a {
            color: #3b82f6;
            text-decoration: none;
        }

        .data-table td a:hover {
            text-decoration: underline;
        }

        .btn-print {
            background-color: #008f39;
            /* matches screenshot green */
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-print:hover {
            background-color: #00762f;
        }

        @media print {

            .btn-print,
            #login-view {
                display: none !important;
            }

            #result-view {
                display: block !important;
                padding: 0;
            }

            .status-card {
                border: none;
                padding: 0;
                margin-bottom: 30px;
            }

            hr.divider {
                display: none;
            }

            .data-table th,
            .data-table td {
                border: 1px solid #000;
                color: #000;
            }

            .status-text,
            .status-title,
            .data-section-title {
                color: #000;
            }

            .data-table th {
                width: 40%;
            }
        }
    </style>
</head>

<body>

    <!-- View 1: Login Form -->
    <div id="login-view">
        <div class="login-card">
            <img src="logo.png" alt="Logo Sekolah" class="logo">
            <h1 class="title">Cetak Kartu Kelulusan</h1>
            <p class="subtitle">KELULUSAN SISWA KELAS XII TAHUN 2026</p>

            <form id="login-form">
                <div class="input-group">
                    <label for="nik">NIK</label>
                    <input type="text" id="nik" placeholder="Masukkan NIK" required>
                </div>
                <div class="input-group">
                    <label for="nisn">NISN</label>
                    <input type="text" id="nisn" placeholder="Masukkan NISN" required>
                </div>

                <button type="submit" class="btn-primary">Cetak Kartu</button>
                <button type="button" class="btn-secondary" onclick="window.location.reload()">Kembali</button>
            </form>
        </div>
    </div>

    <!-- View 2: Result Page -->
    <div id="result-view">
        <div class="result-container">
            <div class="status-card">
                <h2 class="status-title">ANDA DINYATAKAN TIDAK<br>LULUS</h2>
                <p class="status-text">
                    Silahkan hubungi wali kelas anda dengan pengecekan nilai
                </p>
            </div>

            <hr class="divider">

            <h3 class="data-section-title">Data Kelulusan</h3>

            <table class="data-table">
                <tbody>
                    <tr>
                        <th>ID</th>
                        <td>tf0b54vah6nzbo4</td>
                    </tr>
                    <tr>
                        <th>No Pendaftaran</th>
                        <td>334</td>
                    </tr>
                    <tr>
                        <th>NIK</th>
                        <td id="res-nik">232410263</td>
                    </tr>
                    <tr>
                        <th>NISN</th>
                        <td id="res-nisn">0089917143</td>
                    </tr>
                    <tr>
                        <th>Nama Lengkap</th>
                        <td>NAUFAL ILMI AZZAKI</td>
                    </tr>
                    <tr>
                        <th>Jenis Kelamin</th>
                        <td>Laki - Laki</td>
                    </tr>
                    <tr>
                        <th>SKL</th>
                        <td>-</td>
                    </tr>
                </tbody>
            </table>

            <button class="btn-print" onclick="window.print()">Cetak / Print</button>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Get values
            const nik = document.getElementById('nik').value;
            const nisn = document.getElementById('nisn').value;

            // In a real scenario we might validate or fetch data here.
            // For the mock, we can set the input values directly into the result table
            if (nik) document.getElementById('res-nik').textContent = nik;
            if (nisn) document.getElementById('res-nisn').textContent = nisn;

            // Hide login, show results
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';

            // Adjust body background color
            document.body.style.backgroundColor = '#ffffff';
        });
    </script>
</body>

</html>
